name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPDATES_REPO: ChristianTrummer99/whispery-updates

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine macOS signing availability
        id: mac_signing
        if: ${{ matrix.platform == 'macos-latest' }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && \
             [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && \
             [ -n "$APPLE_SIGNING_IDENTITY" ] && \
             [ -n "$APPLE_ID" ] && \
             [ -n "$APPLE_PASSWORD" ] && \
             [ -n "$APPLE_TEAM_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when macOS notarization secrets are missing
        if: ${{ matrix.platform == 'macos-latest' && steps.mac_signing.outputs.enabled != 'true' }}
        run: |
          echo "::warning::Building unsigned macOS artifact because one or more APPLE_* secrets are missing. Gatekeeper may block the app on other Macs."

      - name: Build and publish Tauri release (default)
        id: tauri_default
        if: ${{ matrix.platform != 'macos-latest' || steps.mac_signing.outputs.enabled != 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Whispery ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version."

      - name: Build and publish Tauri release (macOS signed + notarized)
        id: tauri_macos_signed
        if: ${{ matrix.platform == 'macos-latest' && steps.mac_signing.outputs.enabled == 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Whispery ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version."

      - name: Upload updater artifacts for public release
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const allowedExt = new Set(['.json', '.dmg', '.gz', '.sig', '.exe', '.msi']);
          const allowExact = new Set(['latest.json']);
          const input = process.env.ARTIFACT_PATHS || '[]';
          const artifacts = JSON.parse(input);
          const outDir = path.resolve('updater-assets');
          fs.mkdirSync(outDir, { recursive: true });
          const seenNames = new Set();

          function shouldInclude(filePath) {
            const base = path.basename(filePath);
            if (allowExact.has(base)) return true;
            if (base.endsWith('.app.tar.gz')) return true;
            if (base.endsWith('.app.tar.gz.sig')) return true;
            return allowedExt.has(path.extname(base));
          }

          for (const artifactPath of artifacts) {
            if (!fs.existsSync(artifactPath)) continue;
            const base = path.basename(artifactPath);
            if (!shouldInclude(artifactPath)) {
              console.log(`skipping non-updater artifact ${artifactPath}`);
              continue;
            }
            if (seenNames.has(base)) {
              console.log(`skipping duplicate updater artifact ${artifactPath}`);
              continue;
            }
            seenNames.add(base);
            const dest = path.join(outDir, base);
            fs.cpSync(artifactPath, dest, { recursive: true, force: true });
            console.log(`staged ${artifactPath} -> ${dest}`);
          }
          EOF
        env:
          ARTIFACT_PATHS: ${{ steps.tauri_macos_signed.outputs.artifactPaths || steps.tauri_default.outputs.artifactPaths }}

      - name: Upload updater artifacts archive for public release
        uses: actions/upload-artifact@v4
        with:
          name: updater-assets-${{ matrix.platform }}
          path: updater-assets/**
          if-no-files-found: error

  publish-public-updates:
    name: Publish public updater release
    needs: publish-tauri
    runs-on: ubuntu-latest
    env:
      UPDATES_REPO_TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}

    steps:
      - name: Validate updates repo token
        run: |
          if [ -z "$UPDATES_REPO_TOKEN" ]; then
            echo "Missing UPDATES_REPO_TOKEN secret in private repository."
            exit 1
          fi

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: updater-assets
          merge-multiple: true

      - name: Download latest.json from private release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "latest.json" \
            --dir updater-assets

      - name: Rewrite latest.json URLs for public updates repo
        env:
          SOURCE_REPO: ${{ github.repository }}
          TARGET_REPO: ${{ env.UPDATES_REPO }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const source = `/${process.env.SOURCE_REPO}/`;
          const target = `/${process.env.TARGET_REPO}/`;
          const root = path.resolve('updater-assets');

          function walk(dir, files = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full, files);
              else files.push(full);
            }
            return files;
          }

          for (const file of walk(root)) {
            if (path.basename(file) !== 'latest.json') continue;
            const raw = fs.readFileSync(file, 'utf8');
            const updated = raw.split(source).join(target);
            fs.writeFileSync(file, updated, 'utf8');
            console.log(`patched ${file}`);
          }
          EOF

      - name: Publish updater release to public repo
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ env.UPDATES_REPO_TOKEN }}
        with:
          repository: ${{ env.UPDATES_REPO }}
          tag_name: ${{ github.ref_name }}
          name: "Whispery ${{ github.ref_name }}"
          body: "Public updater artifacts for Whispery."
          files: updater-assets/**
